stages:
  - style
  - test
  - build
  - test_build
  - deploy

### Jobs templates for each stage ###

.scripts:
  prepare_python:
    - python --version
    - python -m pip install --upgrade pip setuptools
  init_python_win:
    - SET "PATH=C:\\python\\%PYTHON_VER%;C:\\python\\%PYTHON_VER%\\Scripts;%PATH%"
    - python -m venv --clear build_venv
    - call "build_venv\\Scripts\\activate.bat"
  cleanup_python_win:
    - rmdir build_venv /s /q

.base:
  before_script:
    - !reference [.scripts, prepare_python]
  after_script:
    - echo 
  only:
    refs:
      - main
      - merge_requests
  timeout: 10m

.base-win:
  extends: .base
  before_script:
    - !reference [.scripts, init_python_win]
    - !reference [.scripts, prepare_python]
  after_script:
    - !reference [.scripts, cleanup_python_win]
  timeout: 10m

.style:
  stage: style
  extends: .base
  image: docker-registry.esrf.fr/dau/ewoks:python_3.6
  tags:
    - linux

.test:
  stage: test
  extends: .base
  before_script:
    - !reference [.base, before_script]
    - python -m pip install pytest-cov
  script:
    - python -m pip install --pre .[test]
    - python -m pytest --cov=./ -v .
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'

.test-win:
  stage: test
  extends: .base-win
  script:
    - python -m pip install --pre .[test]
    - python -m pytest -v .

.build:
  stage: build
  extends: .base
  image: docker-registry.esrf.fr/dau/ewoks:python_3.8_doc  # pandoc
  tags:
    - linux
  before_script:
    - !reference [.base, before_script]
    - rm -rf ${ARTIFACTS_DEST}
  after_script:
    - mv ${ARTIFACTS_SOURCE} ${ARTIFACTS_DEST}
  artifacts:
    paths:
      - ${ARTIFACTS_DEST}/
    when: on_success
    expire_in: 2h
  only:
    refs:
      - main

.build_sdist:
  extends: .build
  script:
    - python setup.py sdist
  variables:
    ARTIFACTS_SOURCE: dist
    ARTIFACTS_DEST: sdist
  artifacts:
    paths:
      - sdist/
    when: on_success
    expire_in: 2h

.test_build:
  stage: test_build
  extends: .base
  only:
    refs:
      - main

.test_build-win:
  stage: test_build
  extends: .base-win
  only:
    refs:
      - main

.test_sdist:
  extends: .test_build
  script:
    - cd sdist
    - export REQ_SPECIFIER=$(ls *.tar.gz)[test]
    - echo REQ_SPECIFIER=${REQ_SPECIFIER}
    - python -m pip install --pre ${REQ_SPECIFIER}
    - export PROJECT_NAME=${CI_PROJECT_NAME//[-]/_}
    - python -m pytest -v --pyargs ${PROJECT_NAME}.tests

.test_sdist-win:
  extends: .test_build-win
  script:
    - cd sdist
    - FOR %%F IN (*.tar.gz) DO (
        set REQ_SPECIFIER=%%F[test]
      )
    - echo REQ_SPECIFIER=%REQ_SPECIFIER%
    - python -m pip install --pre %REQ_SPECIFIER%
    - set PROJECT_NAME=%CI_PROJECT_NAME:-=_%
    - python -m pytest -v --pyargs %PROJECT_NAME%.tests

.deploy:
  stage: deploy
  extends: .base
  image: docker-registry.esrf.fr/dau/ewoks:python_3.6
  tags:
    - linux
  only:
    refs:
      - main

### Required jobs ###

flake8:
  extends: .style
  before_script:
    - python -m pip install flake8
  script:
    - flake8

black:
  extends: .style
  before_script:
    - python -m pip install black
  script:
    - LC_ALL=C.UTF-8 black --check --safe .

### Optional jobs ###

.flake8_nb:
  extends: .style
  before_script:
    - python -m pip install flake8_nb
  script:
    - flake8_nb

.build_doc:
  extends: .build
  script:
    - python -m pip install .[doc]
    - python setup.py build_sphinx
  variables:
    ARTIFACTS_SOURCE: build/sphinx/html
    ARTIFACTS_DEST: html
  artifacts:
    paths:
      - html/
    when: on_success
    expire_in: 2h

.pages:
  stage: deploy
  extends: .deploy
  script:
    - rm -rf public
    - mv html public
  after_script:
    - ls -Rl public
  artifacts:
    paths:
      - public
    when: on_success
    expire_in: 2h

.assets:
  stage: deploy
  extends: .deploy
  script:
    - rm -rf assets
    - mkdir assets
    - mv sdist/* assets/
  after_script:
    - ls -Rl assets
  artifacts:
    paths:
      - assets
    when: on_success
    expire_in: 2h

