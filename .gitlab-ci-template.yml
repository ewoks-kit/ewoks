stages:
  - style
  - test
  - doc

.base:
  only:
    refs:
      - main
      - merge_requests

.style:
  extends: ".base"
  image: "docker-registry.esrf.fr/dau/ewoks:python_3.6"

.doc:
  extends: ".base"
  image: "docker-registry.esrf.fr/dau/ewoks:python_3.6"

flake8:
  stage: style
  extends: ".style"
  before_script:
    - pip install flake8
  script:
    - flake8

black:
  stage: style
  extends: ".style"
  before_script:
    - pip install black
  script:
    - LC_ALL=C.UTF-8 black --check --safe .

.sphinx:
  stage: doc
  extends: ".doc"
  before_script:
    - pip install .[doc]
  script:
    - python setup.py build_sphinx

.test:
  stage: test
  extends: ".base"
  before_script:
    # keep for the extensions
  script:
    - pip install pytest-cov
    - pip install .[test]
    - pytest --cov=./ .

.test-3.6:
  extends: ".test"
  image: "docker-registry.esrf.fr/dau/ewoks:python_3.6_glx"

.test-3.7:
  extends: ".test"
  image: "docker-registry.esrf.fr/dau/ewoks:python_3.7"

.test-3.8:
  extends: ".test"
  image: "docker-registry.esrf.fr/dau/ewoks:python_3.8"

.test-3.9:
  extends: ".test"
  image: "docker-registry.esrf.fr/dau/ewoks:python_3.9"
