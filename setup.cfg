[metadata]
name = ewoks
version = 0.0.1-alpha
author = ESRF
author_email = wout.de_nolf@esrf.fr
description = ESRF Workflow System
long_description = file: README.md
long_description_content_type = text/markdown
license = MIT
url = https://gitlab.esrf.fr/workflow/ewoks/ewoks
project_urls = 
    Bug Tracker = https://gitlab.esrf.fr/workflow/ewoks/ewoks/-/issues
classifiers = 
    Intended Audience :: Science/Research
    License :: OSI Approved :: MIT License
    Programming Language :: Python :: 3

[options]
packages = find:
python_requires = >=3.6
install_requires = 
    ewokscore

[options.extras_require]
dev = 
    ewokscore[dev]
test = 
    ewokscore[test]
